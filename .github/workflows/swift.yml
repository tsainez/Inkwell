name: Inkwell CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build & Run Tests
    runs-on: macos-15 # Apple Silicon runner; ships Xcode 16+ to open the project (objectVersion 77)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # The project is saved in Xcode 16's format (objectVersion 77, synchronized
      # folders), so it needs Xcode 16+. The macos-15 image's default Xcode meets
      # this; print the version so the log records exactly what built.
      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcbeautify
        run: brew list xcbeautify || brew install xcbeautify

      - name: Build and Test (iPad Simulator)
        run: |
          set -o pipefail
          # Run serially on a single simulator. Parallel testing fans tests out
          # across cloned simulators, and on the hosted runner some clones fail
          # to launch — marking every test assigned to them as failed in 0.000s
          # even though they pass on a healthy clone. Serial execution is a touch
          # slower but deterministic.
          xcodebuild test \
            -project Inkwell.xcodeproj \
            -scheme Inkwell \
            -destination 'platform=iOS Simulator,name=iPad (10th generation)' \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            clean test | xcbeautify
